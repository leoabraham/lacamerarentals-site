<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LA Camera Rentals</title>
  <meta name="description" content="Cinema camera and production equipment rentals. Site coming soon." />
  <style>
    :root {
      --bg: #e7e7e7;
      --fg: #111111;
      --muted: #555555;
      --line: rgba(17, 17, 17, 0.12);
      --panel: rgba(255, 255, 255, 0.45);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
    }

    .frame {
      width: min(980px, 100%);
      border: 1px solid var(--line);
      background: var(--panel);
      padding: clamp(24px, 4vw, 56px);
    }

    .logo {
      display: block;
      width: min(560px, 100%);
      height: auto;
      margin: 0 0 30px;
    }

    .eyebrow {
      margin: 0 0 10px;
      font-size: 12px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
    }

    h1 {
      margin: 0;
      font-size: clamp(40px, 7vw, 78px);
      line-height: 0.95;
      font-weight: 500;
      letter-spacing: -0.04em;
      max-width: 8ch;
    }

    .divider {
      width: 90px;
      height: 1px;
      background: var(--line);
      margin: 28px 0;
    }

    .copy {
      margin: 0;
      max-width: 34rem;
      font-size: clamp(18px, 2.2vw, 24px);
      line-height: 1.5;
    }

    .contact {
      margin-top: 28px;
      font-size: 16px;
      color: var(--muted);
    }

    .contact a {
      color: var(--fg);
      text-decoration: none;
      border-bottom: 1px solid var(--line);
      padding-bottom: 2px;
    }

    .footer {
      margin-top: 42px;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    @media (max-width: 640px) {
      .frame {
        padding: 24px;
      }
    }
  </style>
</head>
<body>
  <main class="frame">
    <img class="logo" src="logo.jpg" alt="LA Camera Rentals logo" />
    <p class="eyebrow">Los Angeles</p>
    <h1>Coming soon</h1>
    <div class="divider"></div>
    <p class="copy">
      Cinema camera and production equipment rentals. The full site is currently in development.
    </p>
    <p class="contact">
      <a href="mailto:info@lacamerarentals.tv">info@lacamerarentals.tv</a>
    </p>
    <p class="footer">
      <span>LA Camera Rentals</span>
      <span>Site in progress</span>
    </p>
  </main>
</body>
</html>
